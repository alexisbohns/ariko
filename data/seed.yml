  - slug: celesta-uunngaelig-0
    name: Uunngåelig
    type: song
    date: 2025-11-30
    description: À mesure que l'espace s'étire et que le temps se déverse, que la gravité nous attire et que le chaos nous disperse, les souvenirs s'estompent et ma mémoire s'estompe, comme les mots dans le sable que les vagues effacent, ou, polis par la rivière les galets que je ramasse
    parents:
      - atom:celesta-uunngaelig
  - slug: celesta-stjernedugg-0
    name: Stjernedugg
    type: song
    date: 2025-11-23
    description: À l'aurore scintillent de concert la rosée naissante sur la Terre et les étoiles qui s'estompent tendrement dans le Ciel. Et si cet instant, suspendu dans un théâtre polaire, s'appelait la Rosée Stellaire ? Stjernedugg.
    parents:
      - atom:celesta-stjernedugg
