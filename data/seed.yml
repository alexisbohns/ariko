  - slug: rom-act-of-war-0
    name: Act of War
    type: song
    date: 2025-12-26
    description: "As in The Diplomat, from which the lyrics are explicitly inspired, this song explores the emotional divide endured within a relationship of control, suspended between attachment and suffocation, dependence and alienation. This intimate violence appears not as an exception, but as a mirror of the structures of domination that shape society as a whole, extending even to the relations between nations and empires."
    parents:
      - atom:rom-act-of-war
  - slug: rom-win-0
    name: Win
    type: song
    date: 2025-09-21
    description: "A dystopian song from my high school years, humbly inspired by Led Zeppelin, Pink Floyd and Guns N' Roses. There is still no definitive vocal track because this song is very technical."
    parents:
      - atom:rom-win
  - slug: rom-alpha-boy-0
    name: Alpha Boy
    type: song
    date: 2025-09-26
    description: "Un morceau over-trafiqué et satirique sur le masculinisme, où le rapcore de Rage Against The Machine rencontrerait le big beat des Chemical Brothers pour un résultat humblement inspiré de Shaka Ponk."
    parents:
      - atom:rom-alpha-boy
